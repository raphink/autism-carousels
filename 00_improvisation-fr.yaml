imports:
  - raphael_jimena.yaml

output_dir: generated/improvisation-on-the-spectrum-fr/

scenes:
  music_room:
    description: "A warm living room with an upright piano"
    prompt_prefix: >
      Watercolor comic panel in a warm living room with an upright piano and
      sheet music on the stand, {framing}, soft warm light, illustrated style.
      Caption text at the top reads: "{caption}".
    vars:
      framing: "medium shot"
      caption: ""
    characters:
      - raphael
      - jimena

  hallway:
    description: "A social hallway or corridor with blurred people in the background"
    prompt_prefix: >
      Watercolor comic panel in a bright social corridor, other people blurred
      in the background, {framing}, warm golden light, illustrated style.
    vars:
      framing: "medium shot"
    characters:
      - raphael

panels:
  - page: 0
    refs:
      - generated/improvisation-on-the-spectrum/page_0_medium-3.png
    prompt: >
      Decorative title card. Warm parchment-yellow watercolor background.
      Flowing teal musical staff lines and scattered teal music notes float
      across the frame. Large elegant text reads "Improvisation sur le spectre".
      No characters. Vintage, inviting feel.

  - page: 1
    scene: music_room
    refs:
      - generated/improvisation-on-the-spectrum/page_1_medium-3.png
    vars:
      framing: "medium two-shot"
      caption: "En musique, j'improvise facilement..."
    prompt: >
      Raphaël stands playing a silver flute, eyes closed, relaxed and absorbed.
      Jimena sits at the piano beside him, playing as well, calm and attentive.

  - page: 2
    scene: music_room
    refs:
      - generated/improvisation-on-the-spectrum/page_2_medium-2.png
    vars:
      framing: "medium two-shot"
      caption: "Ma femme, elle, s'appuie sur les notes précises qu'elle a apprises."
    prompt: >
      Same room. Raphaël on the left with flute raised, facing slightly away.
      Jimena at the piano looking anxious — eyebrows raised, wide eyes, worried
      frown — as if the improvisation is throwing her off. She is not looking at
      Raphaël.

  - page: 3
    scene: music_room
    refs:
      - generated/improvisation-on-the-spectrum/page_3_medium-1.png
    vars:
      framing: "close-up"
      caption: "Si je joue une fausse note..."
    characters:
      - raphael
    prompt: >
      Close-up on Raphaël from mid-torso up, playing the flute, expression
      neutral and focused. Jimena softly blurred in the background at the piano.

  - page: 4
    scene: music_room
    refs:
      - generated/improvisation-on-the-spectrum/page_4_medium-1.png
    vars:
      framing: "close-up"
      caption: "J'improvise simplement pour m'en sortir."
    characters:
      - raphael
    prompt: >
      Same framing as page 3. Raphaël continues playing the flute, expression
      calm and untroubled. Small teal music notes float from the flute in a
      loose swirl. Jimena blurred in background.

  - page: 5
    scene: hallway
    refs:
      - generated/improvisation-on-the-spectrum/page_5_medium-2.png
    characters:
      - jimena
    prompt: >
      Jimena in the foreground, smiling warmly, one hand raised in a friendly
      wave. A speech bubble reads: "Oh pardon, je ne vous avais pas vu !"
      She faces a partially visible person at the right edge of frame.
      Caption text at the top reads: "Ma femme peut improviser quand elle fait une erreur sociale."

  - page: 6
    scene: hallway
    refs:
      - generated/improvisation-on-the-spectrum/page_6_medium-5.png
    characters:
      - raphael
    prompt: >
      Raphaël centered, mid-torso shot. Expression frozen and distressed —
      furrowed brows, downturned mouth. Both hands raised slightly at his sides,
      palms up, helpless.
      Caption text at the top reads: "Mais quand je fais une erreur sociale, je me fige."

  - page: 7
    scene: hallway
    refs:
      - generated/improvisation-on-the-spectrum/page_7_medium-2.png
    characters:
      - raphael
    prompt: >
      Raphaël stands with arms crossed, expression troubled, looking to one
      side. A thought bubble above his head reads: "J'ai déjà vu cette personne
      mais je ne l'ai pas saluée. Est-ce que je dis bonjour maintenant,
      ou c'est gênant ?"
      People visible as soft blurred silhouettes in background.

  - page: 8
    scene: hallway
    refs:
      - generated/improvisation-on-the-spectrum/page_8_medium-2.png
    characters:
      - raphael
    prompt: >
      Close two-shot. A younger man (brown hair, brown t-shirt, no glasses)
      on the left faces Raphaël on the right. The younger man looks confused
      and slightly alarmed, one hand gesturing outward. Speech bubble from
      younger man: "Pourquoi tu me regardes comme ça ?" Raphaël looks caught
      off guard, wide-eyed, a drop of sweat on his temple.

  - page: 9
    scene: hallway
    refs:
      - generated/improvisation-on-the-spectrum/page_9_medium-1.png
    characters:
      - raphael
    prompt: >
      Raphaël stands alone, facing the viewer, expression open but uncertain.
      One hand raised palm-up in a resigned gesture. Blurred group of people
      in the background. Slightly muted tones.
      Caption text at the top reads: "Je peux naviguer les interactions sociales par des règles, mais improviser mène souvent à des situations gênantes."